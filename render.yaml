# Render.com Blueprint Spec
#
# Allows one-click deployments of GTM Container Analyzer MCP Server.
# Usage: Connect this repository to Render and use this blueprint file.

services:
  - type: web
    name: gtm-container-analyzer
    runtime: node
    buildCommand: npm ci --include=dev && npm run build && cd packages/core && npm ci --include=dev && npm run build && cd ../../mcp-server && npm ci --include=dev && npm run build
    startCommand: node mcp-server/dist/index-http.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Render will prompt the user to input this key during deployment
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: ALLOWED_ORIGINS
        value: https://gtmcontaineranalyzer.com,http://localhost:5173
      - key: VITE_AI_SERVER_URL
        sync: false # Render will prompt for your live Render URL (e.g. https://your-app.onrender.com)
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false # (Optional) Enter your Google Cloud OAuth Client ID for live GTM API syncing
      - key: OPENAI_API_KEY
        sync: false # (Optional) Enter your OpenAI API Key for GPT-4o-mini audits
      - key: GROQ_API_KEY
        sync: false # (Optional) Enter your Groq API Key
      - key: OPENROUTER_API_KEY
        sync: false # (Optional) Enter your OpenRouter API Key
      - key: OPENROUTER_MODEL_LLAMA
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: OPENROUTER_MODEL_DEEPSEEK
        value: deepseek/deepseek-chat:free
      - key: OPENROUTER_MODEL_QWEN
        value: qwen/qwen-2.5-72b-instruct:free
      - key: OPENROUTER_MODEL_GEMMA
        value: google/gemma-2-9b-it:free
      - key: OPENROUTER_MODEL_MISTRAL
        value: mistralai/mistral-7b-instruct:free
      - key: OPENROUTER_MODEL_DEFAULT
        value: meta-llama/llama-3.3-70b-instruct:free
